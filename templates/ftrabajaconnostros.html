<div class="container my-5">
    <div class="row w-100 g-4 justify-content-center">
        <div class="col-11 col-md-8 col-lg-8 shadow-lg p-5 bg-white rounded">
            <div id="contenido">
                <div class="articulo text-start mb-3">
                    <div class="text-center mb-4">
                        <img src="../static/img/logo remove.png" alt="Logo" width="40%">
                        <h2 class="mt-3 fw-bold" style="color: #003366;">Únete a nuestro equipo</h2>
                        <p class="text-muted">Completa tus datos para postularte</p>
                    </div>

                    <form action="" method="post">
                        <div class="mb-3">
                            <label class="form-label"><i class="fa-solid fa-id-card me-2"></i>Nombre Completo</label>
                            <input type="text" name="nombre" class="form-control" placeholder="Ej: Juan Pérez" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label"><i class="fa-solid fa-phone me-2"></i>Número de Teléfono</label>
                            <input type="tel" name="telefono" class="form-control" placeholder="Ej: +57 300 000 0000" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label"><i class="fa-solid fa-envelope me-2"></i>Correo Electrónico</label>
                            <input type="email" name="email" class="form-control" placeholder="ejemplo@correo.com" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label"><i class="fa-solid fa-comment-dots me-2"></i>¿Por qué quieres trabajar con nosotros?</label>
                            <textarea name="mensaje" class="form-control" rows="3" placeholder="Cuéntanos un poco sobre ti..."></textarea>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 py-3 mt-3 fw-bold">ENVIAR POSTULACIÓN</button>
                    </form>
                </div>
